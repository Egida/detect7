services:
  detect7-saas-db:
    image: timescale/timescaledb:latest-pg16
    container_name: detect7-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: detect7
      POSTGRES_PASSWORD: detect7
      POSTGRES_DB: detect7_service
    ports:
      - "5432:5432"
    volumes:
      - detect7_saas_pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U detect7 -d detect7_service"]
      interval: 5s
      timeout: 3s
      retries: 10

  detect7-saas-backend:
    image: python:3.13-slim
    container_name: detect7-saas-backend
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      DETECT7_SERVICE_SECRET: ${DETECT7_SERVICE_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://detect7:detect7@detect7-saas-db:5432/detect7_service}
      FERNET_KEY: ${FERNET_KEY:-}
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      detect7-saas-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - detect7_saas_pip_cache:/root/.cache/pip

  detect7-saas-frontend:
    image: node:25-alpine
    container_name: detect7-saas-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - detect7-saas-backend
    ports:
      - "5174:5173"
    volumes:
      - ./frontend:/app
      - detect7_saas_node_modules:/app/node_modules

volumes:
  detect7_saas_pgdata:
  detect7_saas_pip_cache:
  detect7_saas_node_modules:
